<!DOCTYPE html>
<html>

<head>
    <title>Javascript Array Sorting</title>
</head>

<body>
    <h2>Javascript Array Sorting</h2>
    <button onclick="ascending()">Ascending Order</button>
    <button onclick="descending()">Descending Order</button>
    <p id="result"></p>
    <script>
        var points = [30, 100, 55, 600, 33, 99, 66];
        document.getElementById("result").innerHTML = points;
        function ascending() {
            points.sort(function (a, b) {
                return a - b;
            });
            document.getElementById("result").innerHTML = points;
        }
        function descending() {
            points.sort(function (a, b) {
                return b - a;
            });
            document.getElementById("result").innerHTML = points;
        }
    </script>
</body>

</html>
