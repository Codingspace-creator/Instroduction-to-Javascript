<!DOCTYPE html>
<html>

<body>
    <h2>Javascript String Method</h2>
    <p id="First"></p>
    <p id="Second"></p>
    <script>
        var x = 70;
        var y = 90;
        document.getElementById("First").innerHTML = x + y;
        document.getElementById("Second").innerHTML = String(x) + String(y);
    </script>
</body>

</html>
